<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RSVP Fauzi & Firna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0f0f0f; --bg-card: #1a1a1a; --bg-hover: #222;
      --gold: #C8A961; --gold-light: #D4B96E;
      --text: #e8e0d4; --text-muted: #888;
      --green: #4ade80; --red: #f87171; --blue: #60a5fa;
      --radius: 14px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── Header ── */
    .header { background:var(--bg-card); border-bottom:1px solid rgba(200,169,97,.15); padding:20px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .header h1 { font-size:1.3rem; font-weight:600; }
    .header h1 i { color:var(--gold); margin-right:8px; }
    .header a { color:var(--gold); font-size:.85rem; text-decoration:none; display:flex; align-items:center; gap:6px; }
    .header a:hover { text-decoration:underline; }

    /* ── Stats ── */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; padding:24px 32px; }
    .stat-card { background:var(--bg-card); border:1px solid rgba(255,255,255,.06); border-radius:var(--radius); padding:24px; text-align:center; }
    .stat-number { font-size:2.2rem; font-weight:700; color:var(--gold); display:block; }
    .stat-label { font-size:.78rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }

    /* ── Tabs ── */
    .tabs { display:flex; gap:0; padding:0 32px; border-bottom:1px solid rgba(255,255,255,.06); }
    .tab { padding:14px 24px; font-size:.85rem; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:.3s; }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--gold); border-bottom-color:var(--gold); }

    /* ── Content ── */
    .content { padding:24px 32px; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* ── Table ── */
    .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid rgba(255,255,255,.06); }
    table { width:100%; border-collapse:collapse; font-size:.85rem; }
    th { background:rgba(200,169,97,.08); text-align:left; padding:14px 16px; font-weight:600; font-size:.75rem; text-transform:uppercase; letter-spacing:1px; color:var(--gold); white-space:nowrap; }
    td { padding:12px 16px; border-top:1px solid rgba(255,255,255,.04); vertical-align:top; }
    tr:hover td { background:var(--bg-hover); }
    .badge { padding:4px 10px; border-radius:20px; font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .badge-hadir { background:rgba(74,222,128,.12); color:var(--green); }
    .badge-tidak { background:rgba(248,113,113,.12); color:var(--red); }
    .badge-approved { background:rgba(96,165,250,.12); color:var(--blue); }
    .badge-hidden { background:rgba(255,255,255,.06); color:var(--text-muted); }

    /* ── Buttons ── */
    .btn { padding:6px 14px; border-radius:8px; font-size:.75rem; font-weight:500; border:none; cursor:pointer; transition:.3s; display:inline-flex; align-items:center; gap:6px; }
    .btn-approve { background:rgba(96,165,250,.15); color:var(--blue); }
    .btn-approve:hover { background:rgba(96,165,250,.3); }
    .btn-hide { background:rgba(248,113,113,.1); color:var(--red); }
    .btn-hide:hover { background:rgba(248,113,113,.25); }
    .btn-delete { background:rgba(248,113,113,.08); color:var(--red); }
    .btn-delete:hover { background:rgba(248,113,113,.2); }
    .btn-group { display:flex; gap:6px; flex-wrap:wrap; }

    .msg-text { max-width:300px; line-height:1.5; color:var(--text-muted); }
    .empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty i { font-size:2.5rem; margin-bottom:12px; display:block; color:var(--gold); opacity:.4; }
    .time { font-size:.75rem; color:var(--text-muted); white-space:nowrap; }

    /* ── Wishes Cards (tab 2) ── */
    .wishes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
    .wish-card { background:var(--bg-card); border:1px solid rgba(255,255,255,.06); border-radius:var(--radius); padding:20px; position:relative; transition:.3s; }
    .wish-card:hover { border-color:rgba(200,169,97,.2); }
    .wish-card.approved { border-left:3px solid var(--blue); }
    .wish-card.hidden { opacity:.5; }
    .wish-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
    .wish-name { font-weight:600; font-size:.9rem; }
    .wish-msg { color:var(--text-muted); font-size:.88rem; line-height:1.6; margin-bottom:12px; }
    .wish-footer { display:flex; justify-content:space-between; align-items:center; }

    @media(max-width:768px) {
      .stats { grid-template-columns:repeat(2,1fr); padding:16px; }
      .content { padding:16px; }
      .header { padding:16px; }
      .tabs { padding:0 16px; overflow-x:auto; }
      .tab { padding:12px 16px; white-space:nowrap; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1><i class="fas fa-ring"></i> Admin Panel — RSVP</h1>
    <a href="/"><i class="fas fa-arrow-left"></i> Kembali ke Undangan</a>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card">
      <span class="stat-number" id="stat-total">0</span>
      <span class="stat-label">Total RSVP</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-hadir" style="color:var(--green)">0</span>
      <span class="stat-label">Hadir</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-tidak" style="color:var(--red)">0</span>
      <span class="stat-label">Tidak Hadir</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-tamu">0</span>
      <span class="stat-label">Total Tamu</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-wishes" style="color:var(--blue)">0</span>
      <span class="stat-label">Ucapan Ditampilkan</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="rsvp-list"><i class="fas fa-list"></i>&nbsp; Daftar RSVP</div>
    <div class="tab" data-tab="wishes-manage"><i class="fas fa-comment-dots"></i>&nbsp; Kelola Ucapan</div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Tab 1: RSVP List -->
    <div class="tab-content active" id="rsvp-list">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nama</th>
              <th>Kehadiran</th>
              <th>Jumlah Tamu</th>
              <th>Ucapan</th>
              <th>Status Ucapan</th>
              <th>Waktu</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="rsvp-tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="rsvp-empty" style="display:none">
        <i class="fas fa-inbox"></i>
        <p>Belum ada RSVP masuk.</p>
      </div>
    </div>

    <!-- Tab 2: Wishes Management -->
    <div class="tab-content" id="wishes-manage">
      <div class="wishes-grid" id="wishes-grid"></div>
      <div class="empty" id="wishes-empty" style="display:none">
        <i class="fas fa-comment-slash"></i>
        <p>Belum ada ucapan masuk.</p>
      </div>
    </div>
  </div>

  <script>
    const API = '';

    // ── Tabs ──
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    // ── Load Stats ──
    async function loadStats() {
      const res = await fetch(API + '/api/admin/stats');
      const s = await res.json();
      document.getElementById('stat-total').textContent = s.totalRsvp;
      document.getElementById('stat-hadir').textContent = s.totalHadir;
      document.getElementById('stat-tidak').textContent = s.totalTidakHadir;
      document.getElementById('stat-tamu').textContent = s.totalTamu;
      document.getElementById('stat-wishes').textContent = s.totalApprovedWishes;
    }

    // ── Load RSVP Table ──
    async function loadRsvp() {
      const res = await fetch(API + '/api/admin/rsvp');
      const data = await res.json();
      const tbody = document.getElementById('rsvp-tbody');
      const empty = document.getElementById('rsvp-empty');

      if (data.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = data.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${esc(r.name)}</strong></td>
          <td><span class="badge ${r.attendance === 'hadir' ? 'badge-hadir' : 'badge-tidak'}">${r.attendance === 'hadir' ? '✓ Hadir' : '✗ Tidak'}</span></td>
          <td style="text-align:center">${r.guests}</td>
          <td class="msg-text">${r.message ? esc(r.message) : '<span style="color:#555">—</span>'}</td>
          <td>${r.message ? `<span class="badge ${r.is_approved ? 'badge-approved' : 'badge-hidden'}">${r.is_approved ? '✓ Tampil' : '✗ Disembunyikan'}</span>` : '—'}</td>
          <td class="time">${r.created_at}</td>
          <td>
            <div class="btn-group">
              ${r.message ? `<button class="btn ${r.is_approved ? 'btn-hide' : 'btn-approve'}" onclick="toggleWish(${r.id})">${r.is_approved ? '<i class=\"fas fa-eye-slash\"></i> Sembunyikan' : '<i class=\"fas fa-eye\"></i> Tampilkan'}</button>` : ''}
              <button class="btn btn-delete" onclick="deleteRsvp(${r.id})"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // ── Load Wishes Grid ──
    async function loadWishes() {
      const res = await fetch(API + '/api/admin/rsvp');
      const data = await res.json();
      const withMsg = data.filter(r => r.message && r.message.trim());
      const grid = document.getElementById('wishes-grid');
      const empty = document.getElementById('wishes-empty');

      if (withMsg.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = withMsg.map(r => `
        <div class="wish-card ${r.is_approved ? 'approved' : 'hidden'}">
          <div class="wish-header">
            <span class="wish-name">${esc(r.name)}</span>
            <span class="badge ${r.is_approved ? 'badge-approved' : 'badge-hidden'}">${r.is_approved ? 'Tampil' : 'Tersembunyi'}</span>
          </div>
          <p class="wish-msg">"${esc(r.message)}"</p>
          <div class="wish-footer">
            <span class="time">${r.created_at}</span>
            <button class="btn ${r.is_approved ? 'btn-hide' : 'btn-approve'}" onclick="toggleWish(${r.id})">
              ${r.is_approved ? '<i class=\"fas fa-eye-slash\"></i> Sembunyikan' : '<i class=\"fas fa-eye\"></i> Tampilkan'}
            </button>
          </div>
        </div>
      `).join('');
    }

    // ── Actions ──
    async function toggleWish(id) {
      await fetch(API + '/api/admin/wishes/' + id + '/toggle', { method: 'PATCH' });
      refreshAll();
    }

    async function deleteRsvp(id) {
      if (!confirm('Yakin ingin menghapus RSVP ini?')) return;
      await fetch(API + '/api/admin/rsvp/' + id, { method: 'DELETE' });
      refreshAll();
    }

    function refreshAll() {
      loadStats();
      loadRsvp();
      loadWishes();
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── Init ──
    refreshAll();
    // Auto-refresh setiap 10 detik
    setInterval(refreshAll, 10000);
  </script>
</body>
</html>
